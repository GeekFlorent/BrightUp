<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrightUp | Universal Social</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --brand: #6366f1; --tg-glass: rgba(255, 255, 255, 0.85); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; color: #0f172a; }
        
        /* Layout Fixes */
        .glass-input { width: 100%; padding: 14px 20px; background: white; border: 1.5px solid #e2e8f0; border-radius: 18px; outline: none; transition: 0.3s; font-size: 14px; }
        .glass-input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-main { background: #0f172a; color: white; padding: 16px; border-radius: 20px; font-weight: 800; width: 100%; transition: 0.2s; border: none; cursor: pointer; }
        
        .post-card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animation for smooth switching */
        #signup-extra.hidden { display: none; }
        #login-fields.hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen relative overflow-hidden shadow-2xl">

    <div id="auth-screen" class="h-screen flex flex-col bg-white overflow-hidden">
        <div class="pt-12 pb-6 px-10 text-center flex-shrink-0">
            <div class="w-14 h-14 bg-slate-900 rounded-[22px] mx-auto mb-4 flex items-center justify-center">
                <i data-lucide="zap" class="text-indigo-400 w-7 h-7 fill-indigo-400"></i>
            </div>
            <h1 id="auth-title" class="text-3xl font-black text-slate-900 tracking-tight">BrightUp</h1>
            <p id="auth-subtitle" class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Universal Social Hub</p>
        </div>

        <div class="flex-1 overflow-y-auto px-10 pb-20 no-scrollbar">
            <div class="space-y-3">
                <div id="login-fields">
                    <input type="text" id="loginIdentifier" placeholder="Email or Username" class="glass-input">
                </div>

                <div id="signup-extra" class="hidden space-y-3">
                    <input type="email" id="signupEmail" placeholder="Email Address" class="glass-input">
                    <input type="text" id="fullName" placeholder="Full Name" class="glass-input">
                    <input type="text" id="signupUsername" placeholder="Username" class="glass-input">
                    <input type="tel" id="phone" placeholder="Phone Number" class="glass-input">
                    <div class="flex gap-2">
                        <input type="date" id="birthDate" class="glass-input flex-1 text-slate-400 text-xs">
                        <select id="sex" class="glass-input flex-1 text-slate-400 text-xs">
                            <option value="">Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <input type="text" id="location" placeholder="City, Country" class="glass-input">
                </div>

                <input type="password" id="password" placeholder="Password" class="glass-input">
                
                <button onclick="handleAuthAction()" id="submitBtn" class="btn-main mt-4">Sign In</button>
                
                <button onclick="toggleMode()" id="toggle-btn" class="w-full py-4 text-sm font-extrabold text-indigo-600">
                    Need an account? Sign Up
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-screen overflow-hidden bg-slate-50">
        <header class="p-6 bg-white border-b flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center">
                    <i data-lucide="zap" class="text-indigo-400 w-5 h-5 fill-indigo-400"></i>
                </div>
                <span class="text-xl font-black text-slate-900 uppercase">BrightUp</span>
            </div>
            <button onclick="location.reload()" class="p-2 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="power"></i></button>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto p-6 pb-32 no-scrollbar space-y-6"></main>

        <nav class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t px-6 py-6 flex justify-between z-50">
            <button onclick="switchTab('feed')" class="nav-item active" data-tab="feed"><i data-lucide="globe"></i><span>Explore</span></button>
            <button onclick="switchTab('chats')" class="nav-item" data-tab="chats"><i data-lucide="message-square"></i><span>Messages</span></button>
            <button onclick="switchTab('activity')" class="nav-item" data-tab="activity"><i data-lucide="bell"></i><span>Alerts</span></button>
            <button onclick="switchTab('profile')" class="nav-item" data-tab="profile"><i data-lucide="user"></i><span>Profile</span></button>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = 'https://tsrlgpslcfkdwnfjeqgu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzcmxncHNsY2ZrZHduZmplcWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDQ0MjEsImV4cCI6MjA5MjI4MDQyMX0.ciuTMAnU7bJJD-zwHpPl0A85Uf63no3aIC6PltE9rOQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'login';
        let currentUser = null;

        function refreshIcons() { lucide.createIcons(); }

        function toggleMode() {
            const loginFields = document.getElementById('login-fields');
            const signupFields = document.getElementById('signup-extra');
            const submitBtn = document.getElementById('submitBtn');
            const toggleBtn = document.getElementById('toggle-btn');
            const title = document.getElementById('auth-title');

            if (mode === 'login') {
                mode = 'signup';
                loginFields.classList.add('hidden');
                signupFields.classList.remove('hidden');
                title.innerText = 'Join BrightUp';
                submitBtn.innerText = 'Create Account';
                toggleBtn.innerText = 'Already have an account? Sign In';
            } else {
                mode = 'login';
                loginFields.classList.remove('hidden');
                signupFields.classList.add('hidden');
                title.innerText = 'BrightUp';
                submitBtn.innerText = 'Sign In';
                toggleBtn.innerText = 'Need an account? Sign Up';
            }
            refreshIcons();
        }

        async function handleAuthAction() {
            const btn = document.getElementById('submitBtn');
            const pass = document.getElementById('password').value;
            if (!pass) { alert("Please enter a password"); return; }
            
            btn.innerText = "Processing...";

            if (mode === 'login') {
                const id = document.getElementById('loginIdentifier').value;
                const { data, error } = await _supabase.auth.signInWithPassword({ email: id, password: pass });
                if (error) { 
                    alert("Login error: " + error.message); 
                    btn.innerText = "Sign In"; 
                } else { 
                    currentUser = data.user; 
                    enterApp(); 
                }
            } else {
                const email = document.getElementById('signupEmail').value;
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: pass,
                    options: { 
                        data: { 
                            full_name: document.getElementById('fullName').value,
                            user_name: document.getElementById('signupUsername').value,
                            phone: document.getElementById('phone').value,
                            location: document.getElementById('location').value,
                            sex: document.getElementById('sex').value,
                            birth_date: document.getElementById('birthDate').value
                        }
                    }
                });
                if (error) { 
                    alert("Registration failed: " + error.message); 
                    btn.innerText = "Create Account"; 
                } else { 
                    alert("Success! Check your email for a verification link to activate your account."); 
                    location.reload(); 
                }
            }
        }

        function enterApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            switchTab('feed');
        }

        async function fetchPosts() {
            const { data, error } = await _supabase.from('feeds').select('*, profiles(user_name, full_name)').order('created_at', { ascending: false });
            if (error) return;
            const container = document.getElementById('feed-container');
            if (container) {
                container.innerHTML = data.map(p => `
                    <div class="post-card">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center font-black text-indigo-600">${p.profiles?.full_name?.[0] || 'U'}</div>
                            <div><p class="font-bold text-sm text-slate-900">${p.profiles?.full_name || 'User'}</p><p class="text-[10px] text-indigo-500 font-black uppercase tracking-widest">@${p.profiles?.user_name || 'unknown'}</p></div>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed">${p.content}</p>
                    </div>
                `).join('');
            }
        }

        async function createPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;
            const { error } = await _supabase.from('feeds').insert([{ author_id: currentUser.id, content }]);
            if (!error) { document.getElementById('postContent').value = ''; fetchPosts(); }
            else { alert("Error posting: " + error.message); }
        }

        async function switchTab(tabId) {
            const content = document.getElementById('main-content');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tabId));

            if (tabId === 'feed') {
                content.innerHTML = `
                    <div class="bg-white rounded-[24px] p-6 mb-6 shadow-sm border border-slate-100">
                        <textarea id="postContent" placeholder="Broadcast to the world..." class="w-full bg-transparent border-none outline-none text-sm font-semibold h-20 resize-none"></textarea>
                        <div class="flex justify-end"><button onclick="createPost()" class="bg-slate-900 text-white px-8 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Post</button></div>
                    </div>
                    <div id="feed-container" class="space-y-6"></div>`;
                fetchPosts();
            } else if (tabId === 'chats') {
                content.innerHTML = `<div class="p-20 text-center"><i data-lucide="message-square" class="mx-auto w-12 h-12 text-slate-200 mb-4"></i><p class="text-slate-300 font-bold uppercase text-[10px]">No messages yet</p></div>`;
            } else if (tabId === 'activity') {
                content.innerHTML = `<div class="p-20 text-center"><i data-lucide="bell" class="mx-auto w-12 h-12 text-slate-200 mb-4"></i><p class="text-slate-300 font-bold uppercase text-[10px]">No new alerts</p></div>`;
            } else if (tabId === 'profile') {
                const meta = currentUser.user_metadata;
                content.innerHTML = `
                    <div class="text-center py-10">
                        <div class="w-24 h-24 bg-slate-900 rounded-[35px] mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">${meta.full_name?.[0] || 'U'}</div>
                        <h2 class="text-2xl font-black">${meta.full_name || 'Global User'}</h2>
                        <p class="text-indigo-500 text-xs font-black uppercase tracking-widest mt-1">@${meta.user_name || 'user'}</p>
                        <div class="mt-10 space-y-4 text-left bg-white p-8 rounded-[35px] border border-slate-100 shadow-sm">
                            <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-300 uppercase">Phone</span><span class="text-sm font-bold">${meta.phone || 'N/A'}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-300 uppercase">Region</span><span class="text-sm font-bold">${meta.location || 'N/A'}</span></div>
                            <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-300 uppercase">Gender</span><span class="text-sm font-bold">${meta.sex || 'N/A'}</span></div>
                        </div>
                    </div>`;
            }
            refreshIcons();
        }

        document.addEventListener('DOMContentLoaded', () => refreshIcons());
    </script>
</body>
</html>
